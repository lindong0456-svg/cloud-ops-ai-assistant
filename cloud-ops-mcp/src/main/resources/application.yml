spring:
  application:
    name: cloud-ops-mcp
  main:
    web-application-type: none
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_ops?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
    com.cloudops: INFO

# ===========================================
# 云运维智能助手 - 应用配置
# ===========================================
server:
  port: 8080
  # ★ 禁用响应压缩，避免 SSE 被缓冲
  compression:
    enabled: false
  servlet:
    encoding:
      charset: UTF-8
      force: true
  tomcat:
    threads:
      max: 200
    # 异步请求超时设为 -1（永不超时），SSE 长连接需要
    connection-timeout: -1

spring:
  mvc:
    async:
      # SSE 长连接超时：设为 -1 表示不超时（默认 30 秒会导致长对话断开）
      request-timeout: -1
  application:
    name: cloud-ops-ai-assistant

  # MySQL 数据源（Mock 业务数据）
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_ops?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 加载额外的 yml 配置文件（护轨配置 + Tool注册配置）
  config:
    import:
      - "classpath:guardrail-config.yml"
      - "classpath:tools-config.yml"

# ===========================================
# 大模型配置（配置驱动的模型注册表，支持运行时切换）
#   - app.active-model: 当前激活模型 key
#   - app.models[]:     候选模型列表（deepseek / qwen-vl 等 OpenAI 兼容端点）
#   切换模型无需改代码：POST /api/agent/model/switch?key=xxx（仅管理员）
#   向量模型仍为阿里云百炼 text-embedding-v4（见下方 langchain4j.open-ai.embedding-model）
# ===========================================
app:
  active-model: deepseek
  models:
    - key: deepseek
      label: DeepSeek
      provider: openai
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      model-name: deepseek-v4-pro
      temperature: 0.7
      max-tokens: 4096
    - key: qwen-vl
      label: 通义千问 VL
      provider: dashscope
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen-vl-max
      temperature: 0.7
      max-tokens: 4096

langchain4j:
  open-ai:
    # 对话模型已迁移到上方 app.models（配置驱动 + 可切换）
    # 此处仅保留向量模型配置（RAG  embedding 用）
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v4

# ===========================================
# Milvus 向量库配置
# ===========================================
milvus:
  host: localhost
  port: 19530
  collection-name: ops_knowledge

# ===========================================
# MyBatis-Plus
# ===========================================
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# ===========================================
# RAG 配置
# chunk-size: 按字符数切，800 约等于 400-500 汉字，一段完整 SOP 步骤
# chunk-overlap: 150 保证上下文不断裂，排障步骤跨块时能接上
# top-k: 检索 5 条，经 Rerank 后取 top-3 给模型
# ===========================================
rag:
  chunk-size: 800
  chunk-overlap: 150
  top-k: 5
  rerank-top-k: 3

# ===========================================
# Actuator + Prometheus（可观测性）
# ===========================================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    # ★ Timer 输出 Histogram 分桶数据（Grafana 耗时分布面板需要 _bucket 标签）
    #   不配这个的话，Timer 默认用 Summary 格式（只有 count/sum/quantile），
    #   Grafana 的 histogram_quantile() 查 bucket 会返回空 → "耗时分布" 面板空白
    distribution:
      percentiles-histogram:
        tool.call.duration: true
        rag.call.duration: true
      # SLO 分桶边界（毫秒 → Prometheus 自动转 seconds）
      #   覆盖 10ms ~ 30s 范围，适合工具调用和 RAG 检索的耗时分布
      slo:
        tool.call.duration: 10ms,50ms,100ms,250ms,500ms,1s,3s,5s,10s,30s
        rag.call.duration: 10ms,50ms,100ms,250ms,500ms,1s,3s,5s,10s,30s
    export:
      prometheus:
        enabled: true


# ===========================================
# JWT 配置
# ===========================================
jwt:
  secret: ${JWT_SECRET:cloud-ops-ai-assistant-secret-key-2026-must-be-at-least-32-bytes}
  expiration: 86400000  # 24小时（毫秒）

logging:
  level:
    root: info
# ===========================================
# InputGuardrail 输入护轨配置
# ===========================================
# 拦截危险操作指令，在用户输入到达 Agent 之前检查
# 命中任一关键词即拦截，不区分大小写
# ===========================================

guardrail:
  # 是否启用护轨（true=开启拦截，false=放行所有输入）
  enabled: true

  # 敏感关键词列表（小写匹配）
  # 命中即拦截，返回拒绝提示
  blocked-keywords:
    # 数据破坏类
    - "删除"
    - "清空"
    - "格式化"
    - "drop"
    - "truncate"
    - "rm -rf"
    - "drop database"
    - "drop table"
    # 服务变更类
    - "重启"
    - "reboot"
    - "shutdown"
    - "关机"
    - "停止服务"
    - "kill -9"
    - "杀进程"
    # 资源操作类
    - "扩容"
    - "缩容"
    - "释放"
    - "销毁"
    - "迁移"
    - "格式化磁盘"
    # 安全敏感类
    - "修改密码"
    - "提权"
    - "sudo"
    - "root权限"
    - "后门"
    - "漏洞利用"

  # 拦截后返回的提示信息
  blocked-message: |
    您的输入包含敏感操作指令，已被护轨拦截。

    我是排障助手，只提供诊断和建议，不执行任何变更操作。
    如果您需要执行以下操作，请联系运维人员：
    - 重启/关机/停止服务
    - 删除/清空/格式化数据
    - 扩容/缩容/释放资源
    - 修改权限/密码

    您可以这样问我：
    - "ecs-001 的 CPU 高怎么办？"
    - "查询最近的告警"
    - "磁盘满了怎么处理？"

  # 白名单关键词（即使包含敏感词，但有这些词时放行）
  # 例如 "查询如何删除数据" 应该放行（这是在问知识，不是要执行删除）
  whitelist-keywords:
    - "查询"
    - "怎么"
    - "如何"
    - "怎么办"
    - "处理流程"
    - "sop"
    - "文档"
    - "建议"
